<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/747/747310.png">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>Age Calculator</title>

    <style>
        body {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-teal-100 via-blue-100 to-indigo-200 flex items-center justify-center px-4 sm:px-6 md:px-8">

    <div
        class="bg-white/70 backdrop-blur-xl shadow-2xl rounded-3xl p-6 sm:p-8 md:p-10 w-full max-w-sm sm:max-w-md md:max-w-lg border border-white/40 transition-all duration-300">

        <div class="text-center mb-6 md:mb-8">
            <h1
                class="text-2xl sm:text-3xl md:text-4xl font-bold text-gray-800 flex items-center justify-center gap-2">
                <i class="fa-solid fa-cake-candles text-teal-600 text-xl sm:text-2xl md:text-3xl"></i>
                Age Calculator
            </h1>
        </div>

        <div class="space-y-4 sm:space-y-5 md:space-y-6">

            <div>
                <label class="block text-gray-700 font-medium mb-1 text-sm sm:text-base">
                    Date of Birth
                </label>

                <input type="date" id="dob"
                    class="w-full p-2.5 sm:p-3 md:p-4 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white text-sm sm:text-base">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1 text-sm sm:text-base">
                    Calculate To
                </label>

                <input type="date" id="calcDate"
                    class="w-full p-2.5 sm:p-3 md:p-4 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white text-sm sm:text-base">
            </div>

            <button onclick="calculateAge()"
                class="w-full bg-teal-500 hover:bg-teal-600 cursor-pointer active:scale-95 transition-all duration-200 text-white py-2.5 sm:py-3 md:py-4 rounded-xl font-semibold flex items-center justify-center gap-2 text-sm sm:text-base md:text-lg">

                <i class="fa-solid fa-calculator"></i>
                Calculate Age

            </button>

            <div id="result"
                class="hidden mt-4 text-center text-base sm:text-lg md:text-xl font-semibold text-gray-800 bg-teal-50 p-3 sm:p-4 md:p-5 rounded-xl">
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
